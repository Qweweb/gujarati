version: '3.8'

services:
  db-gujarati:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: n8n
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - coolify

  n8n-gujarati:
    image: n8nio/n8n:latest
    restart: always
    environment:
      - N8N_HOST=n8n.gujaratiapp.in
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db-gujarati
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
    volumes:
      - ./data/n8n:/home/node/.n8n
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      # HTTP Router
      - "traefik.http.routers.gujarati-n8n-http.entryPoints=http"
      - "traefik.http.routers.gujarati-n8n-http.middlewares=redirect-to-https"
      - "traefik.http.routers.gujarati-n8n-http.rule=Host(`n8n.gujaratiapp.in`) || Host(`api.gujaratiapp.in`)"
      # HTTPS Router
      - "traefik.http.routers.gujarati-n8n-https.entryPoints=https"
      - "traefik.http.routers.gujarati-n8n-https.rule=Host(`n8n.gujaratiapp.in`) || Host(`api.gujaratiapp.in`)"
      - "traefik.http.routers.gujarati-n8n-https.service=gujarati-n8n-svc"
      - "traefik.http.routers.gujarati-n8n-https.tls=true"
      - "traefik.http.routers.https-gujarati-n8n.tls.certresolver=letsencrypt"
      # Service
      - "traefik.http.services.gujarati-n8n-svc.loadbalancer.server.port=5678"
    depends_on:
      - db-gujarati
    networks:
      - coolify

  frontend-gujarati:
    image: nginx:alpine
    restart: always
    volumes:
      - ./dist:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      # HTTP Router
      - "traefik.http.routers.gujarati-app-http.entryPoints=http"
      - "traefik.http.routers.gujarati-app-http.middlewares=redirect-to-https"
      - "traefik.http.routers.gujarati-app-http.rule=Host(`app.gujaratiapp.in`) || Host(`gujaratiapp.in`)"
      # HTTPS Router
      - "traefik.http.routers.gujarati-app-https.entryPoints=https"
      - "traefik.http.routers.gujarati-app-https.rule=Host(`app.gujaratiapp.in`) || Host(`gujaratiapp.in`)"
      - "traefik.http.routers.gujarati-app-https.service=gujarati-app-svc"
      - "traefik.http.routers.gujarati-app-https.tls=true"
      - "traefik.http.routers.gujarati-app-https.tls.certresolver=letsencrypt"
      # Service
      - "traefik.http.services.gujarati-app-svc.loadbalancer.server.port=80"
    networks:
      - coolify

networks:
  coolify:
    external: true
