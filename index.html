<!doctype html>
<html lang="gu">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#C05621" />
    <title>ગુજરાતી App</title>

    <!-- Fonts: Noto Sans Gujarati (branding/UI) + Noto Serif Gujarati (script) + Plus Jakarta Sans (UI/Latin) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;500;600;700;800&family=Noto+Serif+Gujarati:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet" />

    <!-- Font Loading Script to prevent FOUT (Flash of Unstyled Text) -->
    <style>
      /* Hide Material Symbols text until font is completely loaded */
      html:not(.fonts-loaded) .material-symbols-outlined {
        color: transparent !important;
        font-size: 0px !important;
        overflow: hidden;
      }
    </style>
    <script>
      (function() {
        if ("fonts" in document) {
          document.fonts.ready.then(function() {
            document.documentElement.classList.add("fonts-loaded");
          });
          // Fallback after 3 seconds
          setTimeout(function() {
            document.documentElement.classList.add("fonts-loaded");
          }, 3000);
        } else {
          document.documentElement.classList.add("fonts-loaded");
        }
      })();
    </script>

    <!-- Microsoft Clarity -->
    <script type="text/javascript">
      (function(c,l,a,r,i,t,y){
          c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};

          y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", "x59mc0a99f");
    </script>

    <!-- Google tag (gtag.js) -->
